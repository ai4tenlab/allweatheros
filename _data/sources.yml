source_policy:
  - 유튜브·개인 미디어 채널은 공식 출처로 사용하지 않는다.
  - AllWeatherOS는 한국 개인투자자 대상 블로그이므로 한국은행, KRX, 금융투자협회, 금융위원회, 금융감독원, 기획재정부, 통계청 등 한국 공식 출처를 우선 확인한다.
  - 미국 지표는 시차가 있으므로 KST 기준 전일/전전일 최신 관측치임을 명확히 표시하고, 한국 환율·국내금리·국내상장 해외 ETF·정책 변수와 연결해서 해석한다.
  - 경제 해석은 가능하면 중앙은행, 정부, 거래소, 국제기구, 운용사 원문을 우선 확인한다.
  - 숫자, 제도, 가격, 금리, 환율, ETF 정보는 공식 데이터 또는 운용사·거래소 자료로 교차검증한다.
  - 언론 보도는 보조 자료로만 활용하며, 핵심 팩트는 원문 발표와 데이터로 확인한다.
  - 계획, 전망, 시행, 확정, 법제화 여부를 구분한다.
