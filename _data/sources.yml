  - name: 언더스탠딩
    role: 산업·경제 구조 해설과 딥다이브 인사이트
  - name: 슈카월드
    role: 대중 경제 이슈와 트렌드 포착
  - name: 머니코믹스
    role: 금융 개념의 쉬운 설명과 대중적 이해 보조
  - name: 소수몽키
    role: 미국주식·배당·장기투자 관점 참고

