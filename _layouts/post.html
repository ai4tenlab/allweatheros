---
layout: default
---
<article class="post">
  <header>
    <p class="eyebrow">{{ page.categories | join: ' · ' }}</p>
    <h1>{{ page.title }}</h1>
    <p class="meta">기준일: {{ page.date | date: "%Y-%m-%d" }} · 작성: {{ page.author | default: site.author }}</p>
  </header>
  {{ content }}
</article>
