<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.title != site.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  {% if site.naver_site_verification %}<meta name="naver-site-verification" content="{{ site.naver_site_verification | escape }}">{% endif %}
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% seo %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": {{ site.brand_name | jsonify }},
    "alternateName": {{ site.brand_alternate_name | jsonify }},
    "url": {{ site.url | append: site.baseurl | append: '/' | jsonify }},
    "description": {{ site.description | jsonify }},
    "knowsAbout": ["거시경제", "자산배분", "환율", "주식", "채권", "부동산", "원자재", "절세계좌", "연금", "금융 리터러시"],
    "inLanguage": "ko-KR"
  }
  </script>
  {% if page.image %}
  <meta property="og:image" content="{{ page.image | absolute_url }}">
  <meta property="og:image:alt" content="{{ page.image_alt | default: page.title }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="{{ page.image | absolute_url }}">
  {% endif %}
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ '/' | relative_url }}">올웨더경제 <span aria-hidden="true">|</span> <small>AllWeatherOS</small></a>
    <nav aria-label="주요 메뉴">
      <a href="{{ '/' | relative_url }}">홈</a>
      <a class="nav-pill" href="{{ '/#latest' | relative_url }}">블로그</a>
      <a href="{{ '/about' | relative_url }}">소개</a>
      <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
    </nav>
  </header>
  <main class="container">
    {{ content }}
  </main>
  <footer class="site-footer">
    <p>© 올웨더경제 | AllWeatherOS · 경제·금융 교육 콘텐츠 · <a href="{{ '/disclaimer' | relative_url }}">금융 정보 이용 안내</a></p>
  </footer>
</body>
</html>
